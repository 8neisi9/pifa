{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-form">
        <h1>Вход в аккаунт</h1>
        
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label for="email" class="required">Email</label>
                <input type="email" name="email" id="email" class="form-control" 
                       value="{{ form.email.data or '' }}" required>
                {% if form.email.errors %}
                <div class="form-error">{{ form.email.errors[0] }}</div>
                {% endif %}
            </div>
            
            <div class="form-group">
                <label for="password" class="required">Пароль</label>
                <input type="password" name="password" id="password" class="form-control" required>
                {% if form.password.errors %}
                <div class="form-error">{{ form.password.errors[0] }}</div>
                {% endif %}
            </div>
            
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" name="remember_me" {% if form.remember_me.data %}checked{% endif %}>
                    <span>Запомнить меня</span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Войти</button>
        </form>
        
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
{% endblock %}
